            });
            if (!arr.length) return document.body;
            arr.sort(function(a,b){

              var bb = (b.clientWidth||0)*(b.clientHeight||0);

                    } catch(e) {}

            if (u.audioTrack) { u.audioTrack.play(); }

  <script>
    // Force Agora video elements to be visible and play
    (function(){
      function forceAgoraVideoVisible(root){
        try {
          var containers = (root || document).querySelectorAll('div[id^="agora_rtc_engine/AgoraSurfaceView_"]');
          containers.forEach(function(container){
            try {
              // Force container visibility
              container.style.cssText += '; width: 100% !important; height: 100% !important; display: block !important; visibility: visible !important; opacity: 1 !important; background: black !important;';
              
              // Find and force video elements
              var videos = container.querySelectorAll('video');
              videos.forEach(function(v){
                try {
                  v.style.cssText += '; width: 100% !important; height: 100% !important; object-fit: cover !important; display: block !important; visibility: visible !important; opacity: 1 !important;';
                  v.setAttribute('autoplay','true');
                  v.setAttribute('playsinline','true');
                  v.setAttribute('webkit-playsinline','true');
                  v.muted = true;
                  v.controls = false;
                  if (typeof v.play === 'function') { 
                    v.play().catch(function(){}); 
                  }
                  // Force srcObject if available
                  if (v.srcObject && v.srcObject.getVideoTracks && v.srcObject.getVideoTracks().length > 0) {
                    console.log('Agora video has stream, forcing play');
                    v.play().catch(function(){});
                  }
                } catch(e) { console.log('Video force error:', e); }
              });
              
              // Find and force canvas elements
              var canvases = container.querySelectorAll('canvas');
              canvases.forEach(function(c){
                try {
                  c.style.cssText += '; width: 100% !important; height: 100% !important; display: block !important; visibility: visible !important; opacity: 1 !important;';
                } catch(e) {}
              });
            } catch(e) { console.log('Container force error:', e); }
          });
        } catch(e) { console.log('Force error:', e); }
      }
      
      var mo = new MutationObserver(function(muts){
        muts.forEach(function(m){
          m.addedNodes && m.addedNodes.forEach(function(n){
            if (n && n.querySelectorAll) {
              forceAgoraVideoVisible(n);
              // Also check if this node itself is an Agora container
              if (n.id && n.id.indexOf('agora_rtc_engine/AgoraSurfaceView_') === 0) {
                setTimeout(function(){ forceAgoraVideoVisible(document.body); }, 100);
              }
            }
          });
        });
      });
      mo.observe(document.documentElement || document.body, {childList:true, subtree:true, attributes:true, attributeFilter:['style']});
      
      // Run periodically to catch any missed elements
      setInterval(function(){ forceAgoraVideoVisible(document.body); }, 1000);
      
      document.addEventListener('DOMContentLoaded', function(){ forceAgoraVideoVisible(document.body); });
      forceAgoraVideoVisible(document.body);
    })();
