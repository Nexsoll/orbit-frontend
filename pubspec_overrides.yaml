# melos_managed_dependency_overrides: camera_android
dependency_overrides:
  mime: ^2.0.0
  flutter_dropzone_platform_interface: 2.0.6
  flutter_dropzone_web: 4.0.2
  blurhash: ^1.1.2
  # Override gallery_saver_plus with a working version
  gallery_saver_plus: ^3.2.9
  agora_rtc_engine:
    git:
      url: https://github.com/AgoraIO-Extensions/Agora-Flutter-SDK.git
      ref: main
  # Align record packages to fix interface mismatch (startStream) seen in record_linux 0.7.2
  record: ^5.0.5
  record_platform_interface: ^1.4.0
  record_linux: ^1.2.1
  # Fix iOS crash: Duplicate plugin key VideoThumbnailPlugin
  video_thumbnail:
    path: ../../packages/video_thumbnail_stub
  get_thumbnail_video:
    path: ../../packages/get_thumbnail_video_stub
