plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id 'com.google.gms.google-services'
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    compileSdkVersion 36
    // Explicit NDK version that supports 16 KB memory page sizes
    // Use the NDK you already installed (29.0.14206865)
    ndkVersion "29.0.14206865"
    namespace = "com.orbit.ke"
    
    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.orbit.ke"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
        // Auth0 configuration
        manifestPlaceholders = [
            'auth0Domain': 'dev-nt2e8s4p1khgrtwt.us.auth0.com',
            'auth0Scheme': 'com.orbit.ke',
            'applicationName': 'io.flutter.app.FlutterApplication'
        ]
        ndk {
            debugSymbolLevel 'FULL'
        }
        // Social login redirect configuration
        // manifestPlaceholders can be used for social login redirects if needed
        // when you run on Ld Player then uncommit this it will run otherwise not run
        // ndk {
            
            // abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"

                

        // }
        
        externalNativeBuild {
            cmake {
                arguments "-DANDROID_STL=c++_shared",
                         "-DANDROID_PLATFORM=android-21",
                         "-DANDROID_TOOLCHAIN=clang",
                         "-DANDROID_ARM_NEON=TRUE",
                         "-DCMAKE_BUILD_TYPE=RelWithDebInfo",
                         "-DANDROID_CPP_FEATURES=rtti exceptions",
                         "-DANDROID_STL_FORCE_FEATURES=ON",
                         "-DCMAKE_CXX_FLAGS=-fno-rtti",
                         // Enable flexible page sizes for 16 KB page size support (NDK r27)
                         "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
                cppFlags "-std=c++17 -frtti -fexceptions"
                abiFilters 'arm64-v8a', 'armeabi-v7a'
            }
        }
    }

    packagingOptions {
        // Keep uncompressed .so packaging (AGP 8.5.1+ aligns to 16 KB automatically)
        jniLibs {
            useLegacyPackaging false
        }
        pickFirst '**/libc++_shared.so'
        pickFirst '**/libjsc.so'
        pickFirst '**/libfbjni.so'
        pickFirst '**/libcpp_shared.so'
    }

    signingConfigs {
        release {
            keyAlias = keystoreProperties['keyAlias']
            keyPassword = keystoreProperties['keyPassword']
            storeFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword = keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.2'
    implementation 'androidx.core:core-ktx:1.10.1'
    implementation 'com.google.android.material:material:1.9.0'
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
